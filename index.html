
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>OPERACIÓN SELECCIONADA CON FUNCIÓN FLECHA </title>
    
    <style>
        /* Forzamos el color del placeholder en todos los navegadores */
        .input-personalizado::placeholder {
            color: #fb923c !important; /* Este es el naranja-400 */
            opacity: 1 !important;
        }

        /* Internet Explorer 10-11 */
        .input-personalizado:-ms-input-placeholder {
            color: #fb923c !important;
        }

        /* Microsoft Edge */
        .input-personalizado::-ms-input-placeholder {
            color: #fb923c !important;
        }
    </style>
</head>
<body class="w-full mx-auto bg-linear-to-r from-yellow-200 to-yellow-100">

    <header class="w-full border-4 rounded-2xl border-amber-500 border-dashed mt-2 px-4 py-4 bg-linear-to-r from-yellow-200 to-yellow-100 mx-auto sm:w-full sm:border-6 sm:py-5 md:w-full md:border-8 md:py-6 lg:w-full lg:max-w-[900px] lg:ml-14 lg:mr-20 lg:py-7 xl:w-full xl:max-w-[1100px] xl:py-8 2xl:max-w-[1600px] 2xl:ml-auto 2xl:mr-auto 2xl:py-10">
        <h1 class="text-center text-yellow-500 font-bold leading-tight text-xl sm:text-2xl md:text-3xl lg:text-4xl xl:text-5xl 2xl:text-6xl">
            OPERACIÓN SELECCIONADA FUNCIÓN FLECHA 
        </h1>
    </header>
 
    <main class="max-w-[1920px] mx-auto px-4 pb-12 w-full sm:w-full md:w-full lg:w-full xl:w-full">

        <details class="mt-8 mb-8 rounded-2xl bg-amber-50 border border-amber-200 sm:mt-10 sm:mb-10 md:mt-12 md:mb-12 lg:mt-14 lg:mb-14 xl:mt-16 xl:mb-16">
            <summary class="bg-linear-to-r from-amber-500 to-amber-300 rounded-2xl text-white p-3 font-bold cursor-pointer transition-all focus:outline-none text-sm sm:text-base md:text-lg lg:text-xl xl:text-2xl">
                4.5. Ejecutar operación seleccionada
            </summary>
            <p class="p-4 text-amber-900 leading-relaxed text-sm sm:text-base md:text-md lg:text-lg xl:text-xl">
                Haz un programa que pregunte al usuario/a dos números y un operador usando el control select de formulario.
                Al final, el programa debe imprimir por pantalla el resultado de realizar la operación que contenga el operador.
            </p>
        </details>

        <div class="flex flex-col items-center gap-8 mt-4 sm:gap-10 md:gap-12 lg:gap-14 xl:gap-16">
            
            <div class="flex flex-col items-center gap-4 border-2 rounded-2xl bg-amber-300 border-amber-400 shadow-sm w-full p-5 md:w-11/12 md:p-6 lg:flex-row lg:flex-nowrap lg:p-7 xl:w-3/4 xl:p-8 2xl:w-full 2xl:max-w-[1600px] 2xl:p-8">
        
                <input class="border-2 text-sm rounded-2xl border-amber-400 bg-amber-100 text-center text-orange-400 font-extrabold p-2.5 input-personalizado focus:outline-none w-full sm:text-base md:text-lg lg:w-32 lg:flex-none lg:text-sm lg:p-1.5 xl:w-36 xl:flex-none xl:text-sm xl:p-1.5 2xl:w-auto 2xl:flex-1 2xl:text-2xl 2xl:p-2.5" 
                       type="number" id="numero" placeholder="Número 1">

                <input class="border-2 text-sm rounded-2xl border-amber-400 text-center text-orange-400 bg-amber-100 font-bold p-2.5 input-personalizado focus:outline-none w-full sm:text-base md:text-lg lg:w-32 lg:flex-none lg:text-sm lg:p-1.5 xl:w-36 xl:flex-none xl:text-sm xl:p-1.5 2xl:w-auto 2xl:flex-1 2xl:text-2xl 2xl:p-2.5" 
                       type="number" id="numerodos" placeholder="Número 2">
                
                <select class="border-2 text-sm rounded-2xl border-amber-400 text-center bg-amber-100 text-orange-400 font-extrabold p-2.5 cursor-pointer focus:outline-none w-full sm:text-base md:text-lg lg:w-32 lg:text-sm lg:p-1.5 xl:w-36 xl:text-sm xl:p-1.5 2xl:w-auto 2xl:text-2xl 2xl:p-2.5" 
                        id="operador" name="operador">
                    <option value="suma">Suma</option>
                    <option value="resta">Resta</option>
                    <option value="multiplicacion">Multiplicación</option>
                    <option value="division">División</option>
                </select>

                <div class="flex flex-col items-center gap-3 w-full lg:flex-row lg:gap-4 lg:flex-1 2xl:flex-row 2xl:flex-nowrap">
                    
   
                <button class="px-1 border-2 rounded-2xl  border-amber-400 text-white font-bold bg-amber-300 cursor-pointer transition-all duration-500 ease-in-out  hover:bg-orange-300 hover:shadow-md hover:shadow-orange-500 " type="button" onclick="calcular()">CALCULAR</button>

                <p class=" text-orange-600 font-bold whitespace-nowrap  text-xs " id="resultado"></p>

            </div>  
        </div>    

           <div class="flex justify-center w-2/3 max-w-[300px] sm:w-1/2 md:w-2/5 lg:w-1/3 xl:w-1/4">
                <img class="w-full h-auto object-contain rounded-2xl drop-shadow-md" src="imagenes/calculadora.jpg" alt="imagen de calculadora y de persona"/>
            </div>

        </div>
    
    

    </main>   


   <script src="js/seleccionada.js"></script>
    
</body>
</html>
